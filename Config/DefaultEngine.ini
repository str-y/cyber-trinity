; DefaultEngine.ini — Cyber Trinity UE 5.4
; Configures Lumen Global Illumination, Nanite, cinematic rendering,
; volumetric fog, rain VFX, and network settings.

[/Script/EngineSettings.GameMapsSettings]
GlobalDefaultGameMode=/Game/Blueprints/BP_CyberTrinityGameMode.BP_CyberTrinityGameMode_C
GlobalDefaultServerGameMode=/Game/Blueprints/BP_CyberTrinityGameMode.BP_CyberTrinityGameMode_C
EditorStartupMap=/Game/Maps/CyberTrinityLevel
GameDefaultMap=/Game/Maps/CyberTrinityLevel
TransitionMap=/Game/Maps/LoadingScreen

; ── Lumen Global Illumination ────────────────────────────────────────────────
[/Script/Engine.RendererSettings]
; Enable Lumen as the default GI method (hardware ray tracing preferred)
r.Lumen.Enabled=1
r.Lumen.TraceMeshSDFs=1
r.Lumen.HardwareRayTracing=1
r.Lumen.HardwareRayTracing.LightingMode=2
; Screen-space Lumen reflections for wet-floor puddle sheen
r.Lumen.Reflections.Allow=1
r.Lumen.Reflections.ScreenSpaceReconstruction=1
; Lumen scene update frequency — cinematic quality
r.Lumen.Scene.ViewDistance=8000
r.Lumen.Scene.FarFieldDistance=50000

; ── Nanite Virtualized Geometry ──────────────────────────────────────────────
r.Nanite=1
r.Nanite.MaxPixelsPerEdge=1.0
r.Nanite.ImposterMaxPixels=5.0

; ── Temporal Super Resolution (TSR) — cinematic 4K output ───────────────────
r.TemporalAA.Algorithm=1
r.TSR.History.ScreenPercentage=200
r.ScreenPercentage=100
r.DynamicRes.MinScreenPercentage=70

; ── Volumetric Fog (smog / rain atmosphere) ──────────────────────────────────
r.VolumetricFog=1
r.VolumetricFog.GridSizeZ=64
r.VolumetricFog.HistoryMissSupersampleCount=16
r.VolumetricFog.InverseSquaredLightDistanceBiasScale=1.0

; ── Ray-Traced Shadows ───────────────────────────────────────────────────────
r.RayTracing.Shadows=1
r.RayTracing.ShadowsDirectional=1
r.RayTracing.ShadowsPointLight=1

; ── Post-Process — cinematic look ────────────────────────────────────────────
; Film grain (contributes to gritty cyberpunk feel)
r.FilmGrain=1
; Bloom — essential for neon glow
r.BloomQuality=5
r.Bloom.Cross=0
; Lens flare for neon light sources
r.LensFlareQuality=2
; Chromatic aberration
r.SceneColorFringeQuality=1
; Depth of field (cinematic)
r.DepthOfFieldQuality=4
r.DOF.Gather.RingCount=5

; ── Motion Blur ──────────────────────────────────────────────────────────────
r.MotionBlurQuality=4
r.MotionBlur.Max=0.05

; ── Ambient Occlusion ────────────────────────────────────────────────────────
r.AmbientOcclusionLevels=3
r.AmbientOcclusionMaxQuality=100

; ── Niagara (rain + data streams + shield FX) ────────────────────────────────
fx.Niagara.MaxGPUParticlesSpawnPerFrame=65536
fx.Niagara.SystemSimTransferBudget=1.0

; ── Network ──────────────────────────────────────────────────────────────────
[/Script/OnlineSubsystemUtils.IpNetDriver]
MaxClientRate=100000
MaxInternetClientRate=100000
NetServerMaxTickRate=60
InitialConnectTimeout=60.0

[/Script/Engine.GameNetworkManager]
TotalNetBandwidth=32000
MaxDynamicBandwidth=7000
MinDynamicBandwidth=4000
