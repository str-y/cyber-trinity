<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CYBER TRINITY — Battle Trinity 3-Team Jewel Combat</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div id="game-container">

    <!-- Main render surface -->
    <canvas id="game-canvas"></canvas>

    <!-- Faction selection -->
    <div id="faction-select-screen">
      <div id="faction-select-panel">
        <div class="select-kicker">CHOOSE YOUR FACTION</div>
        <h1>CYBER TRINITY</h1>
        <div id="faction-options"></div>
        <button id="deploy-button" type="button">DEPLOY AGENT</button>
      </div>
    </div>

    <!-- Holographic HUD overlay -->
    <div id="hud">

      <!-- Scanline film grain -->
      <div id="scanlines"></div>

      <!-- Faction legend — top left -->
      <div id="faction-legend"></div>

      <!-- Team scores — top centre -->
      <div id="score-panel"></div>

      <!-- Crystal counter — top right -->
      <div id="crystal-counter"></div>

      <!-- Next feature contract — right side -->
      <div id="feature-spec"></div>

      <!-- Chaos event banner — top centre below scores -->
      <div id="chaos-event-banner"></div>

      <!-- Alliance indicator — below chaos banner -->
      <div id="alliance-indicator"></div>

      <!-- Kill / event feed — below top-right -->
      <div id="event-feed"></div>

      <!-- Local agent status — bottom left -->
      <div id="status-left"></div>

      <!-- Ability / cooldown — bottom right -->
      <div id="status-right"></div>

      <!-- Match-end scoreboard -->
      <div id="match-scoreboard"></div>

    </div><!-- /hud -->

  </div><!-- /game-container -->

  <script type="module">
    import { Game } from './src/game.js';
    import { FACTIONS } from './src/entities.js';

    const canvas = document.getElementById('game-canvas');
    const screen = document.getElementById('faction-select-screen');
    const options = document.getElementById('faction-options');
    const deployButton = document.getElementById('deploy-button');
    let selectedFaction = 'blue';

    const renderOptions = () => {
      options.innerHTML = Object.values(FACTIONS).map((faction) => `
        <button
          type="button"
          class="faction-card ${faction.id}${faction.id === selectedFaction ? ' selected' : ''}"
          data-faction="${faction.id}">
          <div class="faction-card-header">
            <span>${faction.emoji} ${faction.name}</span>
            <span>${faction.role}</span>
          </div>
          <div class="faction-card-passive">PASSIVE — ${faction.passive.name}</div>
          <div class="faction-card-detail">${faction.passive.details.join('</div><div class="faction-card-detail">')}</div>
        </button>
      `).join('');
    };

    options.addEventListener('click', (event) => {
      const card = event.target.closest('[data-faction]');
      if (!card) return;
      selectedFaction = card.dataset.faction;
      renderOptions();
    });

    deployButton.addEventListener('click', () => {
      const game = new Game(canvas, { playerFaction: selectedFaction });
      screen.style.display = 'none';
      game.start();
    }, { once: true });

    renderOptions();
  </script>
</body>
</html>
