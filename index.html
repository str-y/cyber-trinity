<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CYBER TRINITY — 5v5v5 Data-Node Combat</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div id="game-container">

    <!-- Main render surface -->
    <canvas id="game-canvas"></canvas>

    <!-- Faction selection screen -->
    <div id="faction-select">
      <div class="fs-title">CHOOSE YOUR FACTION</div>
      <div class="fs-cards">
        <button class="fs-card" data-faction="blue">
          <span class="fs-emoji">🔵</span>
          <span class="fs-name blue">THE ARCHIVE</span>
          <span class="fs-role">Data Sniper</span>
          <span class="fs-tagline">Knowledge &amp; Order</span>
          <span class="fs-stats">SPD 55 · AGR 0.55</span>
          <span class="fs-ability">⚡ Railshot</span>
        </button>
        <button class="fs-card" data-faction="green">
          <span class="fs-emoji">🟢</span>
          <span class="fs-name green">LIFE FORGE</span>
          <span class="fs-role">Bio Guard</span>
          <span class="fs-tagline">Life &amp; Harmony</span>
          <span class="fs-stats">SPD 62 · AGR 0.45</span>
          <span class="fs-ability">🛡️ Bio Shield</span>
        </button>
        <button class="fs-card" data-faction="red">
          <span class="fs-emoji">🔴</span>
          <span class="fs-name red">CORE PROTOCOL</span>
          <span class="fs-role">Core Striker</span>
          <span class="fs-tagline">Force &amp; Chaos</span>
          <span class="fs-stats">SPD 85 · AGR 0.85</span>
          <span class="fs-ability">💨 Power Dash</span>
        </button>
      </div>
    </div>

    <!-- Holographic HUD overlay -->
    <div id="hud">

      <!-- Scanline film grain -->
      <div id="scanlines"></div>

      <!-- Faction legend — top left -->
      <div id="faction-legend"></div>

      <!-- Team scores — top centre -->
      <div id="score-panel"></div>

      <!-- Crystal counter — top right -->
      <div id="crystal-counter"></div>

      <!-- Next feature contract — right side -->
      <div id="feature-spec"></div>

      <!-- Chaos event banner — top centre below scores -->
      <div id="chaos-event-banner"></div>

      <!-- Kill / event feed — below top-right -->
      <div id="event-feed"></div>

      <!-- Local agent status — bottom left -->
      <div id="status-left"></div>

      <!-- Ability / cooldown — bottom right -->
      <div id="status-right"></div>

      <!-- Match-end scoreboard -->
      <div id="match-scoreboard"></div>

    </div><!-- /hud -->

  </div><!-- /game-container -->

  <script type="module">
    import { Game } from './src/game.js';
    const canvas = document.getElementById('game-canvas');
    const game   = new Game(canvas);
    const selectScreen = document.getElementById('faction-select');

    document.querySelectorAll('.fs-card').forEach(btn => {
      btn.addEventListener('click', () => {
        const faction = btn.dataset.faction;
        selectScreen.style.display = 'none';
        game.start(faction);
      });
    });
  </script>
</body>
</html>
