<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CYBER TRINITY — Battle Trinity 3-Team Jewel Combat</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div id="game-container">

    <!-- Main render surface -->
    <canvas id="game-canvas"></canvas>

    <!-- Lobby screen (shown first) -->
    <div id="lobby-screen"></div>

    <!-- Faction selection (shown after lobby) -->
    <div id="faction-select-screen" style="display:none">
      <div id="faction-select-panel">
        <div class="select-kicker">CHOOSE YOUR FACTION</div>
        <h1>CYBER TRINITY</h1>
        <div id="faction-options"></div>
        <button id="deploy-button" type="button">DEPLOY AGENT</button>
      </div>
    </div>

    <!-- 3-second countdown overlay -->
    <div id="countdown-overlay" style="display:none">
      <div id="countdown-inner">
        <div id="countdown-number">3</div>
        <div id="countdown-label">DEPLOYING AGENT…</div>
      </div>
    </div>

    <!-- Holographic HUD overlay -->
    <div id="hud">

      <!-- Scanline film grain -->
      <div id="scanlines"></div>

      <!-- Faction legend — top left -->
      <div id="faction-legend"></div>

      <!-- Minimap controls -->
      <div id="minimap-controls"></div>

      <!-- Team scores — top centre -->
      <div id="score-panel"></div>

      <!-- Crystal counter — top right -->
      <div id="crystal-counter"></div>

      <!-- Next feature contract — right side -->
      <div id="feature-spec"></div>

      <!-- Chaos event banner — top centre below scores -->
      <div id="chaos-event-banner"></div>

      <!-- Alliance indicator — below chaos banner -->
      <div id="alliance-indicator"></div>

      <!-- Kill / event feed — below top-right -->
      <div id="event-feed"></div>

      <!-- Local agent status — bottom left -->
      <div id="status-left"></div>

      <!-- Ability / cooldown — bottom right -->
      <div id="status-right"></div>

      <!-- Spectator overlay -->
      <div id="spectator-panel"></div>

      <!-- Match-end scoreboard -->
      <div id="match-scoreboard"></div>

      <!-- Settings panel -->
      <div id="settings-panel" aria-hidden="true">
        <div class="settings-header">
          <div class="panel-title blue">SYSTEM SETTINGS</div>
          <span class="settings-hint">ESC</span>
        </div>

        <label class="setting-row" for="setting-game-speed">
          <span class="setting-label">GAME SPEED</span>
          <select id="setting-game-speed">
            <option value="0.5">0.5×</option>
            <option value="1" selected>1×</option>
            <option value="2">2×</option>
          </select>
        </label>

        <label class="setting-row" for="setting-effect-quality">
          <span class="setting-label">EFFECT QUALITY</span>
          <select id="setting-effect-quality">
            <option value="low">LOW</option>
            <option value="high" selected>HIGH</option>
          </select>
        </label>

        <label class="setting-row setting-toggle" for="setting-hud-visible">
          <span class="setting-label">HUD DISPLAY</span>
          <input id="setting-hud-visible" type="checkbox" checked />
        </label>

        <label class="setting-row setting-toggle" for="setting-crt-enabled">
          <span class="setting-label">CRT EFFECT</span>
          <input id="setting-crt-enabled" type="checkbox" checked />
        </label>
      </div>

    </div><!-- /hud -->

  </div><!-- /game-container -->

  <script type="module">
    import { Game } from './src/game.js';
    import { FACTIONS } from './src/entities.js';
    import { initLobby } from './src/lobby.js';
    const canvas = document.getElementById('game-canvas');

    const lobbyScreen  = document.getElementById('lobby-screen');
    const factionScreen = document.getElementById('faction-select-screen');
    const countdownOverlay = document.getElementById('countdown-overlay');
    const countdownNumber  = document.getElementById('countdown-number');
    const options      = document.getElementById('faction-options');
    const deployButton = document.getElementById('deploy-button');
    let selectedFaction = 'blue';

    // ── Faction selection rendering ────────────────────────────────────────
    const renderOptions = () => {
      options.innerHTML = Object.values(FACTIONS).map((faction) => `
        <button
          type="button"
          class="faction-card ${faction.id}${faction.id === selectedFaction ? ' selected' : ''}"
          data-faction="${faction.id}">
          <div class="faction-card-header">
            <span>${faction.emoji} ${faction.name}</span>
            <span>${faction.role}</span>
          </div>
          <div class="faction-card-passive">PASSIVE — ${faction.passive.name}</div>
          <div class="faction-card-detail">${faction.passive.details.join('</div><div class="faction-card-detail">')}</div>
        </button>
      `).join('');
    };

    options.addEventListener('click', (event) => {
      const card = event.target.closest('[data-faction]');
      if (!card) return;
      selectedFaction = card.dataset.faction;
      renderOptions();
    });

    // ── Lobby init ────────────────────────────────────────────────────────
    const lobby = initLobby(
      { lobbyScreen, factionScreen, countdownOverlay, countdownNumber },
      (config) => {
        // Called after countdown: start the game with lobby config
        const game = new Game(canvas, { ...config, playerFaction: config.playerFaction });
        window.cyberTrinityGame = game;
        game.start();
      },
    );

    // ── Deploy button: starts 3-second countdown ──────────────────────────
    deployButton.addEventListener('click', () => {
      lobby.startCountdown(selectedFaction);
    });

    renderOptions();
  </script>
</body>
</html>
